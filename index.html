
<style>

.sec-btn.active{border-color:#378ADD;color:#185FA5}
#sb-fields{flex:1;overflow-y:auto;padding:12px}

.field-group textarea{min-height:68px;line-height:1.5}

#export-btn{margin-left:auto;padding:6px 14px;border-radius:var(--border-radius-md);background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);font-size:12px;cursor:pointer;color:var(--color-text-primary)}
#export-btn:hover{background:var(--color-background-secondary)}
#preview{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.pv-section{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:18px 20px;cursor:pointer;transition:border-color .15s}

.pv-section.active{border:1.5px solid #378ADD}
.pv-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-tertiary);margin-bottom:8px}
.pv-title{font-size:17px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px;line-height:1.3}
.pv-sub{font-size:13px;color:var(--color-text-secondary);line-height:1.5}
.pv-price{display:inline-block;margin-top:6px;padding:3px 10px;background:var(--color-background-info);color:var(--color-text-info);border-radius:999px;font-size:12px;font-weight:500}
.pv-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.pv-row:last-child{border-bottom:none}
</style>

<h2 class="sr-only">Details by Jazz website editor — select a section on the left to edit it</h2>

<div id="app">
  <div id="sidebar">
    <div id="sb-top">
      <h2>Sections</h2>
      <button class="sec-btn active" onclick="selectSection('hero')">★ Hero</button>
      <button class="sec-btn" onclick="selectSection('services')">◆ Services</button>
      <button class="sec-btn" onclick="selectSection('pricing')">$ Pricing</button>
      <button class="sec-btn" onclick="selectSection('contact')">@ Contact</button>
      <button class="sec-btn" onclick="selectSection('footer')">— Footer</button>
    </div>
    <div id="sb-fields">
      <h2>Edit fields</h2>
      <div id="fields-content"></div>
    </div>
  </div>
  <div id="canvas-wrap">
    <div id="toolbar">
      <span>Live preview — click a section to edit</span>
      <button id="export-btn" onclick="exportSite()">Export HTML ↓</button>
    </div>
    <div id="preview"></div>
  </div>
</div>

<script>
const data = {
  hero: {
    eyebrow: 'Premium Mobile Detailing on Oahu',
    h1a: 'DETAILS',
    h1b: 'by Jazz',
    tagline: 'A premium detailing experience designed for clients who want their vehicle to look polished, protected, and professionally cared for without the hassle.',
    btn1: 'Request a Quote',
    btn2: 'View Photos',
    stat1title: 'Premium Finish',
    stat1desc: 'Luxury presentation with refined attention to detail.',
    stat2title: 'Mobile Service',
    stat2desc: 'Convenient on-site detailing at your home or office.',
    stat3title: 'Client-Focused',
    stat3desc: 'Professional, reliable, and built around your schedule.',
  },
  services: {
    heading: 'Built for a premium first impression',
    s1title: 'Interior Detailing',
    s1desc: 'Deep vacuuming, wipe-downs, glass cleaning, trim care, and a refined reset that leaves the cabin fresh and presentable.',
    s2title: 'Exterior Detailing',
    s2desc: 'Foam wash, wheel cleaning, tire dressing, and protection-focused finishing for a sleek, high-end shine.',
    s3title: 'Premium Add-Ons',
    s3desc: 'Paint enhancement, deeper correction, and elevated finish options for clients who want even more refinement.',
  },
  pricing: {
    heading: 'Simple packages, elevated presentation',
    sub: 'Transparent pricing for every level of service.',
    p1name: 'Refresh Detail',
    p1desc: 'Ideal for routine upkeep and clean presentation.',
    p1price: 'From $225',
    p2name: 'Premium Inside / Out',
    p2desc: 'Balanced interior reset and exterior gloss.',
    p2price: 'From $325',
    p3name: 'Correction + Protection',
    p3desc: 'Higher-end finish for standout presentation.',
    p3price: 'Custom Quote',
  },
  contact: {
    heading: 'Ready to upgrade your vehicle\'s presentation?',
    sub: 'Contact me today to set an appointment or for more information.',
    phone: '(808) 384-3052',
    instagram: '@detailsbyjazz',
    area: 'Oahu, Hawaii',
  },
  footer: {
    text: '© 2026 Details by Jazz. Premium mobile detailing.',
  }
};

const sections = ['hero','services','pricing','contact','footer'];
let active = 'hero';

const fieldDefs = {
  hero: [
    {key:'eyebrow',label:'Eyebrow badge text'},
    {key:'h1a',label:'Headline line 1 (silver)'},
    {key:'h1b',label:'Headline line 2'},
    {key:'tagline',label:'Tagline paragraph',type:'textarea'},
    {key:'btn1',label:'Primary button'},
    {key:'btn2',label:'Secondary button'},
    {key:'stat1title',label:'Stat 1 title'},{key:'stat1desc',label:'Stat 1 description'},
    {key:'stat2title',label:'Stat 2 title'},{key:'stat2desc',label:'Stat 2 description'},
    {key:'stat3title',label:'Stat 3 title'},{key:'stat3desc',label:'Stat 3 description'},
  ],
  services: [
    {key:'heading',label:'Section heading'},
    {key:'s1title',label:'Service 1 title'},{key:'s1desc',label:'Service 1 description',type:'textarea'},
    {key:'s2title',label:'Service 2 title'},{key:'s2desc',label:'Service 2 description',type:'textarea'},
    {key:'s3title',label:'Service 3 title'},{key:'s3desc',label:'Service 3 description',type:'textarea'},
  ],
  pricing: [
    {key:'heading',label:'Section heading'},{key:'sub',label:'Subtitle',type:'textarea'},
    {key:'p1name',label:'Package 1 name'},{key:'p1desc',label:'Package 1 description'},{key:'p1price',label:'Package 1 price'},
    {key:'p2name',label:'Package 2 name'},{key:'p2desc',label:'Package 2 description'},{key:'p2price',label:'Package 2 price'},
    {key:'p3name',label:'Package 3 name'},{key:'p3desc',label:'Package 3 description'},{key:'p3price',label:'Package 3 price'},
  ],
  contact: [
    {key:'heading',label:'Heading',type:'textarea'},
    {key:'sub',label:'Subtext',type:'textarea'},
    {key:'phone',label:'Phone number'},
    {key:'instagram',label:'Instagram handle'},
    {key:'area',label:'Service area'},
  ],
  footer: [
    {key:'text',label:'Footer text'},
  ]
};

function selectSection(sec){
  active=sec;
  document.querySelectorAll('.sec-btn').forEach((b,i)=>b.classList.toggle('active',sections[i]===sec));
  document.querySelectorAll('.pv-section').forEach(s=>s.classList.toggle('active',s.dataset.sec===sec));
  renderFields();
  document.querySelector(`[data-sec="${sec}"]`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderFields(){
  const fc=document.getElementById('fields-content');
  fc.innerHTML='';
  (fieldDefs[active]||[]).forEach(f=>{
    const g=document.createElement('div');
    g.className='field-group';
    const tag=f.type==='textarea'?'textarea':'input';
    g.innerHTML=`<label>${f.label}</label><${tag}>${f.type==='textarea'?data[active][f.key]:''}</${tag}>`;
    if(tag==='input') g.querySelector('input').value=data[active][f.key];
    g.querySelector(tag).addEventListener('input',e=>{
      data[active][f.key]=e.target.value;
      renderPreview();
    });
    fc.appendChild(g);
  });
}

function renderPreview(){
  const pv=document.getElementById('preview');
  pv.innerHTML='';
  sections.forEach(sec=>{
    const div=document.createElement('div');
    div.className='pv-section'+(sec===active?' active':'');
    div.dataset.sec=sec;
    div.onclick=()=>selectSection(sec);
    div.innerHTML=sectionPreview(sec);
    pv.appendChild(div);
  });
}

function sectionPreview(sec){
  const d=data[sec];
  if(sec==='hero') return `<div class="pv-label">Hero section</div>
    <div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:6px;">${d.eyebrow}</div>
    <div class="pv-title">${d.h1a} ${d.h1b}</div>
    <div class="pv-sub">${d.tagline}</div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <span style="padding:5px 12px;background:#378ADD;color:#fff;border-radius:999px;font-size:12px;">${d.btn1}</span>
      <span style="padding:5px 12px;border:0.5px solid var(--color-border-secondary);border-radius:999px;font-size:12px;color:var(--color-text-secondary);">${d.btn2}</span>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">
      ${['1','2','3'].map(n=>`<div style="flex:1;min-width:120px;padding:8px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);"><div style="font-size:12px;font-weight:500;color:var(--color-text-primary);">${d['stat'+n+'title']}</div><div style="font-size:11px;color:var(--color-text-secondary);">${d['stat'+n+'desc']}</div></div>`).join('')}
    </div>`;
  if(sec==='services') return `<div class="pv-label">Services</div>
    <div class="pv-title">${d.heading}</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;">
      ${['1','2','3'].map(n=>`<div style="padding:10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);"><div style="font-size:12px;font-weight:500;margin-bottom:4px;">${d['s'+n+'title']}</div><div style="font-size:11px;color:var(--color-text-secondary);">${d['s'+n+'desc']}</div></div>`).join('')}
    </div>`;
  if(sec==='pricing') return `<div class="pv-label">Pricing</div>
    <div class="pv-title">${d.heading}</div>
    <div class="pv-sub" style="margin-bottom:10px;">${d.sub}</div>
    ${['1','2','3'].map(n=>`<div class="pv-row"><div><div style="font-size:13px;font-weight:500;">${d['p'+n+'name']}</div><div style="font-size:11px;color:var(--color-text-secondary);">${d['p'+n+'desc']}</div></div><span class="pv-price">${d['p'+n+'price']}</span></div>`).join('')}`;
  if(sec==='contact') return `<div class="pv-label">Contact</div>
    <div class="pv-title">${d.heading}</div>
    <div class="pv-sub" style="margin-bottom:10px;">${d.sub}</div>
    <div style="font-size:13px;color:var(--color-text-primary);">📞 ${d.phone}</div>
    <div style="font-size:13px;color:var(--color-text-primary);">📸 ${d.instagram}</div>
    <div style="font-size:13px;color:var(--color-text-primary);">📍 ${d.area}</div>`;
  if(sec==='footer') return `<div class="pv-label">Footer</div><div class="pv-sub">${d.text}</div>`;
}

function exportSite(){
  const d=data;
  const h=d.hero, s=d.services, p=d.pricing, c=d.contact, f=d.footer;
  const html=`<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Details by Jazz</title>
<style>

  *{box-sizing:border-box}html{scroll-behavior:smooth}
  body{margin:0;font-family:Inter,ui-sans-serif,system-ui,sans-serif;background:radial-gradient(circle at top left,rgba(27,152,232,0.18),transparent 28%),radial-gradient(circle at 85% 15%,rgba(201,208,216,0.12),transparent 22%),linear-gradient(180deg,#05070b 0%,#0a0d14 54%,#06080c 100%);color:var(--white);line-height:1.5}
  a{color:inherit;text-decoration:none}img{max-width:100%;display:block}
  .container{width:min(calc(100% - 32px),var(--max));margin:0 auto}

  .nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0;gap:18px}
  .brand{display:flex;flex-direction:column;gap:3px}
  .brand-top{letter-spacing:.24em;text-transform:uppercase;color:var(--silver);font-size:.8rem;font-weight:800}
  .brand-bottom{font-size:.92rem;color:#dce3ee;opacity:.82}
  .nav-links{display:flex;align-items:center;gap:24px;color:#d7deea;font-size:.95rem}
  .nav-links a:hover{color:var(--blue)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:14px 22px;border-radius:999px;border:1px solid transparent;font-weight:700;transition:180ms ease}
  .btn-primary{background:linear-gradient(135deg,var(--blue) 0%,#58b9f4 100%);color:white;box-shadow:0 16px 32px rgba(27,152,232,0.28)}

  .hero{padding:84px 0 48px}

<body>
<header class="topbar">

    <nav class="nav-links">
      <a href="#services">Services</a><a href="#pricing">Pricing</a><a href="#contact">Contact</a>
    </nav>
    <a class="btn btn-primary" href="#contact">Book Now</a>
  </div>
</header>
<main id="top">
<section class="hero">
  <div class="container hero-grid">
    <div>
      <div class="eyebrow">${h.eyebrow}</div>
      <h1><span class="silver">${h.h1a}</span><span class="blue">${h.h1b}</span></h1>
      <p>${h.tagline}</p>

        <a class="btn btn-primary" href="#contact">${h.btn1}</a>
        <a class="btn btn-secondary" href="#photos">${h.btn2}</a>
      </div>
      <div class="hero-stats">
        <div class="stat"><strong>${h.stat1title}</strong><span>${h.stat1desc}</span></div>
        <div class="stat"><strong>${h.stat2title}</strong><span>${h.stat2desc}</span></div>
